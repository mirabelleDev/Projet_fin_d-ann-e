name: gestion_locative
description: Application de gestion locative
publish_to: 'none' #Cela signifie que tu ne souhaites pas publier ton application sur le site officiel pub.dev (le "Play Store" des packages Dart). C'est parfait pour un projet privé. 
version: 1.0.0+1

environment:
  sdk: '^3.6.2'   # Adaptez à votre version (ex: '>=3.0.0 <4.0.0')

dependencies:
  flutter:
    sdk: flutter
    uses-material-design: true

  # Gestion d'état
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Navigation
  go_router: ^10.2.0

  # HTTP et stockage
  dio: ^5.3.2
  shared_preferences: ^2.5.3

  # Utilitaires
  uuid: ^4.0.0
  intl: ^0.18.1

  # Design
  cupertino_icons: ^1.0.8

  # ✅ BASE DE DONNÉES SQLITE
  drift: ^2.28.0
  sqlite3_flutter_libs: ^0.5.42
  path_provider: ^2.1.5
  path: ^1.9.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2

# ✅ GÉNÉRATEUR DE CODE DRIFT
  drift_dev: ^2.28.0
  build_runner: ^2.4.15

